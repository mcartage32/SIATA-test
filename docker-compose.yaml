services:
  db:
    image: postgres:15
    container_name: SIATA-db
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: SIATA-backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://root:root@db:5432/postgres
    depends_on:
      - db
    command: >
      sh -c "
      echo '⏳ Esperando DB...' &&
      sleep 5 &&
      npx prisma generate &&
      npx prisma migrate reset --force &&
      npx prisma db push &&
      npm run prisma:seed:node &&
      npm run start:dev
      "

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: SIATA-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - backend

volumes:
  pgdata:
